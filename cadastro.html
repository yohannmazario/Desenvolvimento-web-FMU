<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Usuário</title>
</head>
<body>

  <form action="/usuarios/novo" method="post">

    <fieldset>
      <legend>Dados Pessoais</legend>

      <label for="nome">Nome completo:</label>
      <input type="text" id="nome" name="nome"
             placeholder="Ex.: João Silva" required
             minlength="3" maxlength="100">

      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email"
             required autocomplete="email">

      <label for="senha">Senha:</label>
      <input type="password" id="senha" name="senha"
             minlength="8" required>

      <label for="nascimento">Data de nascimento:</label>
      <input type="date" id="nascimento" name="nascimento">

      <label for="curso">Curso:</label>
      <select id="curso" name="curso" required>
        <option value="">Selecione...</option>
        <option value="cc">Ciência da Computação</option>
        <option value="ec">Engenharia da Computação</option>
        <option value="si">Sistemas de Informação</option>
      </select>

      <!-- Radio buttons — mesmo name = mesmo grupo -->
      <fieldset>
        <legend>Período:</legend>
        <label><input type="radio" name="periodo" value="manha"> Manhã</label>
        <label><input type="radio" name="periodo" value="noite"> Noite</label>
      </fieldset>

      <label for="bio">Sobre você (opcional):</label>
      <textarea id="bio" name="bio" rows="4" maxlength="500"></textarea>

      <label>
        <input type="checkbox" name="aceitar_termos" required>
        Aceito os <a href="/termos">termos de uso</a>
      </label>

    </fieldset>

    <button type="submit">Criar conta</button>
  </form>

</body>
</html>
